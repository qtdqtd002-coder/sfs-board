<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillFarmSurvivor 협업 보드</title>
<style>
  :root{
    /* 표면 레이어(두 번째 중립 레이어 = 상단바/툴바) */
    --bg:#0c0e15; --surface:#11131c; --col:#0f111a; --panel:#171a26; --panel2:#1e2231; --inset:#0b0d14;
    --bar:#13151f;
    --line:#262b3b; --line2:#323950;
    --ink:#eef0f7; --txt:#dfe2ec; --dim:#9aa2bb; --dim2:#6b7390;
    --accent:#7c5cff; --accent-ink:#b9a9ff; --accent2:#34d6c8;
    --ok:#46d27e; --warn:#f0b34a; --danger:#ff5d6c; --info:#5b9dff;
    --p0:#ff5d6c; --p1:#f0b34a; --p2:#7d86a3;
    --radius:11px; --radius-sm:8px;
    --mono:'Cascadia Code',Consolas,monospace;
    --ease:cubic-bezier(.22,1,.36,1);
    --z-drop:50; --z-sticky:40; --z-backdrop:100; --z-panel:110; --z-modal:120; --z-toast:200;
    --shadow:0 16px 40px -12px #000a;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI','Malgun Gothic',system-ui,sans-serif;
    font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:rgba(124,92,255,.35)}

  /* ── 상단바 ── */
  .topbar{position:sticky;top:0;z-index:var(--z-sticky);background:var(--bar);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:9px 18px;flex-wrap:wrap}
  .brand{font-size:15.5px;font-weight:750;letter-spacing:-.01em;white-space:nowrap}
  .brand b{color:var(--accent-ink);font-weight:800}
  .brand small{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:1px}
  .repo{font-family:var(--mono);font-size:11px;color:var(--accent2);text-decoration:none;
    border:1px solid var(--line2);padding:3px 9px;border-radius:7px}
  .repo:hover{background:#1a1f30}
  .grow{flex:1}
  .legend{display:flex;gap:12px;font-size:11.5px;color:var(--dim)}
  .who{display:inline-flex;align-items:center;gap:6px}
  .av{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:800;color:#0b0d14}

  /* 공통 버튼 */
  .btn{font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--line2);background:var(--panel2);
    color:var(--txt);padding:6px 11px;transition:background .15s,border-color .15s,transform .05s}
  .btn:hover{background:#272c40;border-color:#3b4366}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:650}
  .btn.primary:hover{background:#8b6dff}
  .btn.icon{padding:6px 9px}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .me-pick{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--panel2);
    border:1px solid var(--line2);border-radius:var(--radius-sm);padding:4px 8px}
  .me-pick select{background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:12px;outline:none;cursor:pointer}
  .me-pick.unset{border-color:var(--warn);color:var(--warn)}

  /* 알림 벨 */
  .bell{position:relative}
  .bell .dotN{position:absolute;top:-3px;right:-3px;min-width:15px;height:15px;border-radius:9px;background:var(--accent);
    color:#fff;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px}
  .conn{font-size:11.5px;font-weight:650;border-radius:20px;padding:3px 10px;border:1px solid var(--line2);white-space:nowrap}
  .conn.live{background:rgba(70,210,126,.13);color:var(--ok);border-color:rgba(70,210,126,.4)}
  .conn.local{background:var(--panel2);color:var(--dim)}
  .conn.err{background:rgba(255,93,108,.13);color:var(--danger);border-color:rgba(255,93,108,.4)}
  .dirty{display:none;align-items:center;gap:6px;font-size:11.5px;color:var(--warn)}
  .dirty.on{display:inline-flex}
  .pdot{width:7px;height:7px;border-radius:50%;background:var(--warn);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .saved{display:none;font-size:11.5px;color:var(--ok)}.saved.on{display:inline}

  /* ── 탭 ── */
  .tabs{display:flex;gap:2px;padding:0 18px;background:var(--bar);border-bottom:1px solid var(--line);position:sticky;top:45px;z-index:var(--z-sticky)}
  .tab{font-size:13px;font-weight:600;color:var(--dim);background:none;border:none;padding:10px 14px 11px;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--txt)}
  .tab.on{color:var(--ink);border-bottom-color:var(--accent)}
  .tab .cnt{font-size:10.5px;color:var(--dim);background:var(--panel2);border-radius:10px;padding:0 6px;font-weight:700}

  main{padding:16px 18px 80px}
  .view{display:none}.view.on{display:block}

  /* ── 툴바 ── */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:var(--radius-sm);overflow:hidden}
  .seg button{border:none;background:none;color:var(--dim);font-size:12px;padding:6px 12px}
  .seg button+button{border-left:1px solid var(--line2)}
  .seg button.on{background:var(--accent);color:#fff;font-weight:650}
  .search{flex:1;min-width:160px;max-width:320px;background:var(--panel);border:1px solid var(--line2);
    border-radius:var(--radius-sm);color:var(--txt);padding:7px 11px;font-size:12.5px;font-family:inherit}
  .search:focus{outline:none;border-color:var(--accent)}
  .search::placeholder{color:var(--dim2)}

  /* ── 칸반: 6칼럼 동일너비 ── */
  .kanban{display:grid;grid-template-columns:repeat(6,minmax(210px,1fr));gap:12px;align-items:start;overflow-x:auto;padding-bottom:8px}
  .col{background:var(--col);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;min-height:90px}
  .col-head{padding:10px 12px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .col-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
  .col-title{font-size:12.5px;font-weight:700;color:var(--txt)}
  .col-cnt{font-size:10.5px;color:var(--dim);background:var(--panel2);border-radius:10px;padding:1px 7px;font-weight:700;margin-left:auto}
  .col-body{padding:8px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:48px}
  .col.dragover{outline:2px dashed var(--accent);outline-offset:-3px}
  .col-add{border:1px dashed var(--line2);background:none;color:var(--dim2);border-radius:var(--radius-sm);
    padding:6px;font-size:12px}
  .col-add:hover{border-color:var(--accent);color:var(--txt)}

  /* ── 카드(깔끔) ── */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 11px;
    cursor:pointer;transition:border-color .15s,background .15s,transform .06s;position:relative}
  .card:hover{border-color:var(--line2);background:#1a1e2d}
  .card:active{transform:translateY(1px)}
  .card.dragging{opacity:.4}
  .card.insert{box-shadow:0 -2px 0 -1px var(--accent)}
  .card-head{display:flex;align-items:flex-start;gap:7px}
  .pchip{flex-shrink:0;font-family:var(--mono);font-size:9.5px;font-weight:800;padding:1px 5px;border-radius:4px;margin-top:1px}
  .pchip.P0{background:rgba(255,93,108,.16);color:var(--p0)}
  .pchip.P1{background:rgba(240,179,74,.16);color:var(--p1)}
  .pchip.P2{background:rgba(125,134,163,.16);color:var(--p2)}
  .card-title{font-size:13px;font-weight:650;color:var(--ink);line-height:1.35}
  .card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .tag{font-size:10px;color:var(--dim);background:var(--panel2);border-radius:5px;padding:1px 7px}
  .tag.hold{color:var(--warn);background:rgba(240,179,74,.1)}
  .card-foot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
  .owner{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--txt)}
  .owner .av{width:16px;height:16px;font-size:9px}
  .owner.none{color:var(--dim2)}
  .meta{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--dim2);margin-left:auto}
  .meta span{display:inline-flex;align-items:center;gap:3px}
  .card-area{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:7px;opacity:.8;word-break:break-word}
  .col-empty{color:var(--dim2);font-size:11.5px;padding:8px;text-align:center}

  /* ── 진행률(스테이지 체크리스트) ── */
  .wrap{max-width:1000px}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;margin-bottom:13px}
  .stage-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .stage-n{font-family:var(--mono);font-size:11px;font-weight:800;color:var(--accent-ink);background:rgba(124,92,255,.14);border-radius:6px;padding:2px 7px}
  .stage-name{font-size:15px;font-weight:750;color:var(--ink)}
  .stage-frac{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-left:auto}
  .stage-note{font-size:12px;color:var(--dim);margin:2px 0 10px}
  .bar{height:7px;background:var(--inset);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:var(--accent);transition:width .5s var(--ease)}
  .bar>i.full{background:var(--ok)}
  .ck{margin:11px 0 0;padding:0;list-style:none}
  .ck li{display:flex;align-items:flex-start;gap:9px;padding:5px 0;font-size:12.5px;color:var(--txt);cursor:pointer;border-radius:6px}
  .ck li:hover{background:var(--panel2)}
  .ck .box{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--dim2);flex-shrink:0;margin-top:1px;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:background .15s,border-color .15s}
  .ck li.done .box{background:var(--ok);border-color:var(--ok);color:#06210f}
  .ck li.done span{color:var(--dim2);text-decoration:line-through}
  .ck .sub{font-size:11px;color:var(--dim2);display:block;margin-top:1px}

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin:6px 0 16px;max-width:1000px}
  @media(max-width:720px){.summary{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px}
  .stat .n{font-size:22px;font-weight:800;color:var(--ink)}
  .stat .n.a{color:var(--accent-ink)}.stat .n.g{color:var(--ok)}.stat .n.w{color:var(--warn)}
  .stat .l{font-size:11px;color:var(--dim);margin-top:2px}

  .section-h{font-size:14px;font-weight:750;color:var(--ink);margin:22px 0 4px;display:flex;align-items:center;gap:8px}
  .section-sub{font-size:11.5px;color:var(--dim);margin-bottom:11px}

  /* 결정·논의 */
  .dlist{display:flex;flex-direction:column;gap:9px;max-width:1000px}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 13px}
  .dcard.open{border-color:rgba(240,179,74,.4);background:rgba(240,179,74,.04)}
  .dcard.hold{border-color:rgba(255,93,108,.4);background:rgba(255,93,108,.04)}
  .dcard.promoted,.dcard.answered{border-color:rgba(70,210,126,.3)}
  .dq{font-size:13px;font-weight:650;color:var(--ink);margin-bottom:6px}
  .dmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--dim)}
  .pill{font-size:10.5px;font-weight:700;border-radius:20px;padding:2px 9px}
  .pill.open{background:rgba(240,179,74,.16);color:var(--warn)}
  .pill.checking{background:rgba(91,157,255,.16);color:var(--info)}
  .pill.answered,.pill.promoted{background:rgba(70,210,126,.16);color:var(--ok)}
  .pill.hold{background:rgba(255,93,108,.16);color:var(--danger)}
  .dnote{font-size:11.5px;color:var(--dim);margin-top:7px;background:var(--panel2);border-radius:7px;padding:8px 10px;line-height:1.55}
  .dcard{position:relative}.dcard .mini{position:absolute;top:9px;right:11px;opacity:0}.dcard:hover .mini{opacity:.7}

  /* 문서 */
  .docs{display:flex;flex-wrap:wrap;gap:8px;max-width:1000px}
  .docs a{text-decoration:none;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:8px 12px;min-width:150px;transition:border-color .15s,background .15s}
  .docs a:hover{border-color:var(--line2);background:var(--panel2)}
  .docs .dl{font-size:12.5px;font-weight:650;color:var(--txt);display:block}
  .docs .dn{font-size:10.5px;color:var(--dim);margin-top:1px}

  /* ── 히스토리 ── */
  .timeline{max-width:840px;display:flex;flex-direction:column}
  .ev{display:flex;gap:11px;padding:9px 2px;border-top:1px solid var(--line)}
  .ev:first-child{border-top:none}
  .ev-ic{width:26px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:13px;background:var(--panel2);border:1px solid var(--line)}
  .ev-b{flex:1;min-width:0}
  .ev-t{font-size:12.5px;color:var(--txt);line-height:1.45}
  .ev-t b{color:var(--ink);font-weight:700}
  .ev-m{font-size:10.5px;color:var(--dim2);margin-top:2px;display:flex;gap:8px}
  .ev-actor{font-weight:700}

  /* ── 활동 드롭다운(fixed, 클리핑 회피) ── */
  .drop{position:fixed;top:50px;right:14px;width:340px;max-height:70vh;overflow-y:auto;background:var(--surface);
    border:1px solid var(--line2);border-radius:var(--radius);box-shadow:var(--shadow);z-index:var(--z-drop);
    display:none;animation:dropin .16s var(--ease)}
  .drop.on{display:block}
  @keyframes dropin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .drop-h{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
  .drop-h b{font-size:12.5px;color:var(--ink)}
  .drop-h button{font-size:11px;color:var(--accent-ink);background:none;border:none}
  .drop .ev{padding:9px 13px}
  .drop-empty{padding:24px 13px;text-align:center;color:var(--dim2);font-size:12px}

  /* ── 슬라이드오버(상세 보기) ── */
  .backdrop{position:fixed;inset:0;background:#000a;backdrop-filter:blur(1.5px);z-index:var(--z-backdrop);
    opacity:0;pointer-events:none;transition:opacity .2s}
  .backdrop.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;top:0;right:0;height:100%;width:440px;max-width:94vw;background:var(--surface);
    border-left:1px solid var(--line2);box-shadow:-20px 0 50px -20px #000c;z-index:var(--z-panel);
    transform:translateX(100%);transition:transform .26s var(--ease);display:flex;flex-direction:column}
  .sheet.on{transform:none}
  .sheet-h{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .sheet-h .pchip{margin-top:0}
  .sheet-h .sp{flex:1}
  .sheet-b{flex:1;overflow-y:auto;padding:16px}
  .fld{margin-bottom:13px}
  .fld>label{display:block;font-size:10.5px;color:var(--dim);font-weight:600;margin-bottom:5px;letter-spacing:.01em}
  .fld input,.fld textarea,.fld select{width:100%;background:var(--inset);border:1px solid var(--line2);border-radius:var(--radius-sm);
    color:var(--txt);padding:8px 10px;font-size:13px;font-family:inherit}
  .fld textarea{min-height:60px;resize:vertical;line-height:1.5}
  .fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sheet-sec{margin-top:18px;padding-top:15px;border-top:1px solid var(--line)}
  .sheet-sec>h4{margin:0 0 9px;font-size:12px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .sheet-sec .cnt{font-size:10px;color:var(--dim);font-weight:600}

  /* 체크리스트(상세) */
  .clist{display:flex;flex-direction:column;gap:2px;margin-bottom:9px}
  .cli{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;font-size:12.5px}
  .cli:hover{background:var(--panel2)}
  .cli .box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--dim2);flex-shrink:0;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;font-size:10px}
  .cli.done .box{background:var(--ok);border-color:var(--ok);color:#06210f}
  .cli.done .ctext{color:var(--dim2);text-decoration:line-through}
  .cli .ctext{flex:1;cursor:default}
  .cli .x{opacity:0;color:var(--dim2);background:none;border:none;font-size:14px;padding:0 4px}
  .cli:hover .x{opacity:1}
  .addrow{display:flex;gap:7px}
  .addrow input{flex:1;background:var(--inset);border:1px solid var(--line2);border-radius:var(--radius-sm);color:var(--txt);padding:6px 9px;font-size:12.5px;font-family:inherit}
  .addrow input:focus{outline:none;border-color:var(--accent)}

  /* 코멘트 */
  .cmt{display:flex;gap:9px;padding:9px 0;border-top:1px solid var(--line)}
  .cmt:first-child{border-top:none}
  .cmt-b{flex:1;min-width:0}
  .cmt-h{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:3px}
  .cmt-h .nm{font-weight:700;color:var(--ink)}
  .cmt-h .tm{color:var(--dim2)}
  .cmt-x{opacity:0;background:none;border:none;color:var(--dim2);font-size:13px;margin-left:auto}
  .cmt:hover .cmt-x{opacity:.7}
  .cmt-text{font-size:12.5px;color:var(--txt);line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .cmt-empty{font-size:12px;color:var(--dim2);padding:6px 0}
  .cmt-box{margin-top:10px}
  .cmt-box textarea{width:100%;background:var(--inset);border:1px solid var(--line2);border-radius:var(--radius-sm);
    color:var(--txt);padding:8px 10px;font-size:12.5px;font-family:inherit;min-height:54px;resize:vertical;line-height:1.5}
  .cmt-box textarea:focus{outline:none;border-color:var(--accent)}
  .cmt-box .br{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
  .sheet-f{display:flex;gap:8px;align-items:center;padding:12px 16px;border-top:1px solid var(--line)}
  .sheet-f .del{color:var(--danger);border-color:rgba(255,93,108,.4)}
  .sheet-f .del:hover{background:rgba(255,93,108,.1)}
  .sheet-f .sp{flex:1}

  /* ── 모달(설정·결정) ── */
  .mbg{position:fixed;inset:0;background:#000b;backdrop-filter:blur(2px);z-index:var(--z-modal);
    display:none;align-items:flex-start;justify-content:center;padding:6vh 16px;overflow:auto}
  .mbg.on{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line2);border-radius:14px;width:100%;max-width:520px;
    padding:20px 22px;box-shadow:var(--shadow)}
  .modal h2{margin:0 0 4px;font-size:16px;color:var(--ink)}
  .modal .lead{font-size:11.5px;color:var(--dim);margin:0 0 15px}
  .chk-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--txt)}
  .chk-row input{width:auto}
  .modal a.lnk{color:var(--accent2);font-size:11px}
  .mfoot{display:flex;gap:9px;justify-content:flex-end;margin-top:16px;align-items:center}
  .mfoot .del{margin-right:auto;color:var(--danger);border-color:rgba(255,93,108,.4)}
  .hint{font-size:11px;color:var(--dim2);margin-top:5px}

<script>
"use strict";
// ============================================================================
//  SkillFarmSurvivor 협업 보드 — 칸반/진행률/히스토리 + 라이브(GitHub API) 동기
//  데이터 단일 소스 = board-data.js (window.SFS_BOARD). 저장 = 그 파일에 되쓰기.
// ============================================================================
const FILE_NAME = "board-data.js";
const FILE_HEADER =
`// ============================================================================
// SkillFarmSurvivor 협업 보드 — 데이터 단일 소스 (Single Source of Truth)
// ----------------------------------------------------------------------------
//  - 이 파일이 보드의 유일한 진실 소스다. board.html 은 이 파일을 그릴 뿐이다.
//  - 사람이 손으로 고쳐도 되고(순수 JSON), board.html 에서 편집하면 자동 저장된다.
//  - 형식: window.SFS_BOARD = { ...JSON... };  (앞/뒤 한 줄만 비-JSON)
// ============================================================================
window.SFS_BOARD = `;

const LS_CFG = "sfs_board_cfg_v1";
const GH_API = "https://api.github.com";
let state, cfg = {}, apiMode = false, remoteSha = null, pollTimer = null, autosaveTimer = null, saving = false;
let fileHandle = null, dirty = false, filterOwner = "all", searchText = "", curTab = "board";
let detailId = null, editingDec = null, dragId = null;

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const member = id => (state?.meta?.members||[]).find(m=>m.id===id) || null;
const uid = p => p + Math.random().toString(36).slice(2,8);
const COL_DOT = { hold:"#7d86a3", planning:"#b07cff", ready:"#5b9dff", dev:"#34d6c8", review:"#f0b34a", done:"#46d27e" };
const ACT_IC = { move:"↔", comment:"💬", check:"✅", create:"➕", edit:"✏️", delete:"🗑", decision:"⚖️", milestone:"📊" };
const DEC_LABEL = { open:"⬜ 질문", checking:"🔵 확인 중", answered:"✅ 답변", promoted:"⤴ 승격", hold:"🛑 보류" };

// ── 부팅 ─────────────────────────────────────────────────────────────────────
function boot(){
  cfg = loadCfg();
  apiMode = !!(cfg.token && cfg.owner && cfg.repo && cfg.path);
  bindUI();
  if(!window.showOpenFilePicker) $("#btnConnect").style.display = "none";
  updateConnChip();
  if(apiMode){ loadFromApi(true); return; }
  if(window.SFS_BOARD){ state = normalize(structuredClone(window.SFS_BOARD)); renderAll(); }
  else showSetup();
}
// 구버전 데이터 보강(누락 필드 기본값)
function normalize(s){
  s.cards = (s.cards||[]).map(c => ({ comments:[], checklist:[], ...c,
    comments:c.comments||[], checklist:c.checklist||[] }));
  s.activity = s.activity || [];
  s.decisions = s.decisions || [];
  s.milestones = s.milestones || [];
  s.docs = s.docs || [];
  return s;
}
function showSetup(msg){
  $("#main-fatal")?.remove();
  $("main").innerHTML = `<div class="fatal" id="main-fatal"><h2>🔗 라이브 연결이 필요합니다</h2>
    <p>이 보드는 GitHub <code>${esc(cfg.owner)}/${esc(cfg.repo)}</code> 데이터에 직접 연결합니다. 상단 <b>⚙</b>을 눌러 토큰을 1회 등록하세요.</p>
    ${msg?`<p style="color:var(--danger)">⚠ ${esc(msg)}</p>`:""}
    <p class="hint">토큰은 이 브라우저에만 저장되며 서버로 전송되지 않습니다.</p>
    <button class="btn primary" onclick="openCfg()">⚙ 지금 연결</button></div>`;
}

// ── 전체 렌더 ────────────────────────────────────────────────────────────────
function renderAll(){
  $("#hsub").textContent = state.meta.subtitle || "psy ↔ 루아파파";
  $("#hrepo").href = state.meta.repoUrl || "#";
  $("#hrepo").textContent = (state.meta.repo || "repo") + " ↗";
  $("#hlegend").innerHTML = state.meta.members.map(m =>
    `<span class="who"><span class="av" style="background:${esc(m.color)}">${esc(m.name[0])}</span>${esc(m.name)} · <span style="color:var(--dim2)">${esc(m.role)}</span></span>`).join("");
  renderMeSel();
  renderBoard();
  renderProgress();
  renderHistory();
  renderBell();
}
function renderMeSel(){
  const sel = $("#meSel");
  sel.innerHTML = `<option value="">선택</option>` + state.meta.members.map(m=>`<option value="${esc(m.id)}">${esc(m.name)}</option>`).join("");
  sel.value = cfg.me || "";
  $("#mePick").classList.toggle("unset", !cfg.me);
}

// ── 칸반 ─────────────────────────────────────────────────────────────────────
function matchFilter(c){
  if(filterOwner!=="all" && c.owner!==filterOwner) return false;
  if(searchText){
    const hay = [c.title,c.desc,c.area,(c.tags||[]).join(" "),c.source].join(" ").toLowerCase();
    if(!hay.includes(searchText)) return false;
  }
  return true;
}
function renderBoard(){
  $("#tabCntBoard").textContent = state.cards.length;
  $("#kanban").innerHTML = state.columns.map(col => {
    const cards = state.cards.filter(c=>c.column===col.id);
    const shown = cards.filter(matchFilter);
    const cnt = (filterOwner!=="all"||searchText) ? `${shown.length}/${cards.length}` : `${cards.length}`;
    const body = shown.map(cardHtml).join("") ||
      `<div class="col-empty">${cards.length?"필터 결과 없음":"비어 있음"}</div>`;
    return `<div class="col" data-col="${esc(col.id)}">
      <div class="col-head"><span class="col-dot" style="background:${COL_DOT[col.id]||'#666'}"></span>
        <span class="col-title">${esc(col.title)}</span><span class="col-cnt">${cnt}</span></div>
      <div class="col-body" data-col="${esc(col.id)}">${body}
        <button class="col-add" data-col="${esc(col.id)}">＋ 추가</button></div>
    </div>`;
  }).join("");
  wireBoard();
}
function cardHtml(c){
  const m = member(c.owner);
  const ck = (c.checklist||[]); const ckDone = ck.filter(i=>i.done).length;
  const ownerHtml = m ? `<span class="owner"><span class="av" style="background:${esc(m.color)}">${esc(m.name[0])}</span>${esc(m.name)}</span>`
                      : `<span class="owner none">담당 미정</span>`;
  const metaBits = [];
  if((c.comments||[]).length) metaBits.push(`<span title="코멘트">💬 ${c.comments.length}</span>`);
  if(ck.length) metaBits.push(`<span title="체크리스트">☑ ${ckDone}/${ck.length}</span>`);
  return `<div class="card" draggable="true" data-card="${esc(c.id)}">
    <div class="card-head">
      ${c.priority?`<span class="pchip ${esc(c.priority)}">${esc(c.priority)}</span>`:""}
      <span class="card-title">${esc(c.title)}</span>
    </div>
    ${(c.tags||[]).length?`<div class="card-tags">${c.tags.map(t=>`<span class="tag ${/hold/i.test(t)?"hold":""}">${esc(t)}</span>`).join("")}</div>`:""}
    ${c.area?`<div class="card-area">${esc(c.area)}</div>`:""}
    <div class="card-foot">${ownerHtml}${metaBits.length?`<span class="meta">${metaBits.join("")}</span>`:""}</div>
  </div>`;
}
function wireBoard(){
  $$(".card").forEach(el=>{
    el.onclick = e => { if(!el.classList.contains("dragging")) openDetail(el.dataset.card); };
    el.addEventListener("dragstart", e=>{ dragId=el.dataset.card; el.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
    el.addEventListener("dragend", ()=>{ dragId=null; $$(".dragging,.insert,.dragover").forEach(x=>x.classList.remove("dragging","insert","dragover")); });
    el.addEventListener("dragover", e=>{ e.preventDefault(); $$(".insert").forEach(x=>x.classList.remove("insert")); if(el.dataset.card!==dragId) el.classList.add("insert"); });
    el.addEventListener("drop", e=>{ e.preventDefault(); e.stopPropagation(); moveCard(dragId, el.closest(".col-body").dataset.col, el.dataset.card); });
  });
  $$(".col-body").forEach(b=>{
    b.addEventListener("dragover", e=>{ e.preventDefault(); b.closest(".col").classList.add("dragover"); });
    b.addEventListener("dragleave", ()=>b.closest(".col").classList.remove("dragover"));
    b.addEventListener("drop", e=>{ e.preventDefault(); if(e.target.closest(".card")) return; moveCard(dragId, b.dataset.col, null); });
  });
  $$(".col-add").forEach(b=> b.onclick = ()=> openDetail(null, b.dataset.col));
}
function colTitle(id){ const c=state.columns.find(x=>x.id===id); return c?c.title:id; }
function moveCard(id, toCol, beforeId){
  if(!id) return;
  const i = state.cards.findIndex(c=>c.id===id); if(i<0) return;
  const card = state.cards[i]; const from = card.column;
  if(from===toCol && !beforeId) return;
  state.cards.splice(i,1);
  card.column = toCol; card.updated = todayStr();
  if(beforeId){ const ti=state.cards.findIndex(c=>c.id===beforeId); state.cards.splice(ti<0?state.cards.length:ti,0,card); }
  else { let last=-1; state.cards.forEach((c,ix)=>{ if(c.column===toCol) last=ix; }); state.cards.splice(last+1,0,card); }
  if(from!==toCol) logActivity("move", `<b>${esc(card.title)}</b> · ${esc(colTitle(from))} → ${esc(colTitle(toCol))}`, card.id);
  markDirty(); renderBoard(); renderBell();
}

// ── 상세 보기(슬라이드오버) ───────────────────────────────────────────────────
function fillSel(sel, opts, val){ sel.innerHTML = opts.map(o=>`<option value="${esc(o.v)}">${esc(o.t)}</option>`).join(""); sel.value = val||""; }
function openDetail(id, presetCol){
  detailId = id;
  const c = id ? state.cards.find(x=>x.id===id) : null;
  $("#d-htitle").textContent = id ? "상세 보기" : "새 카드";
  fillSel($("#d-column"), state.columns.map(k=>({v:k.id,t:k.title})), c?c.column:(presetCol||"planning"));
  fillSel($("#d-owner"), [{v:"",t:"담당 미정"},...state.meta.members.map(m=>({v:m.id,t:m.name}))], c?c.owner:"");
  $("#d-title").value = c?c.title:""; $("#d-desc").value = c?(c.desc||""):"";
  $("#d-prio").value = c?(c.priority||""):""; $("#d-tags").value = c?(c.tags||[]).join(", "):"";
  $("#d-area").value = c?(c.area||""):""; $("#d-source").value = c?(c.source||""):"";
  const pc = $("#d-pchip");
  if(c&&c.priority){ pc.style.display=""; pc.className="pchip "+c.priority; pc.textContent=c.priority; } else pc.style.display="none";
  $("#d-delete").style.display = id?"":"none";
  $("#d-clSec").style.display = id?"":"none";
  $("#d-cmSec").style.display = id?"":"none";
  if(id){ renderChecklist(c); renderComments(c); }
  $("#d-cmWho").textContent = cfg.me ? `작성자: ${member(cfg.me)?.name||cfg.me}` : "⚠ 상단에서 '나'를 먼저 선택하세요";
  $("#sheetBg").classList.add("on"); $("#sheet").classList.add("on");
  setTimeout(()=>$("#d-title").focus(),60);
}
function closeDetail(){ $("#sheetBg").classList.remove("on"); $("#sheet").classList.remove("on"); detailId=null; }
function saveDetail(){
  const title = $("#d-title").value.trim();
  if(!title){ toast("제목을 입력하세요"); return; }
  const data = { title, desc:$("#d-desc").value.trim(), column:$("#d-column").value, owner:$("#d-owner").value,
    priority:$("#d-prio").value, area:$("#d-area").value.trim(),
    tags:$("#d-tags").value.split(",").map(s=>s.trim()).filter(Boolean), source:$("#d-source").value.trim(), updated:todayStr() };

function renderProgress(){
  const ms = state.milestones||[];
  let allItems=0, allDone=0;
  ms.forEach(m=> m.items.forEach(i=>{ allItems++; if(i.done) allDone++; }));
  const overall = allItems ? Math.round(allDone/allItems*100) : 0;
  const cardsDone = state.cards.filter(c=>c.column==="done").length;
  let html = `<div class="wrap">`;
  html += `<div class="summary">
    <div class="stat"><div class="n a">${overall}%</div><div class="l">데모 전체 진행률</div></div>
    <div class="stat"><div class="n g">${allDone}/${allItems}</div><div class="l">완료 체크 항목</div></div>
    <div class="stat"><div class="n">${state.cards.length}</div><div class="l">전체 카드</div></div>
    <div class="stat"><div class="n w">${cardsDone}</div><div class="l">완료 카드</div></div></div>`;
  html += ms.map((m,ix)=>{
    const tot=m.items.length, dn=m.items.filter(i=>i.done).length, pct=tot?Math.round(dn/tot*100):0;
    return `<div class="stage">
      <div class="stage-head"><span class="stage-n">STAGE ${ix+1}</span><span class="stage-name">${esc(m.name)}</span><span class="stage-frac">${dn}/${tot} · ${pct}%</span></div>
      ${m.note?`<div class="stage-note">${esc(m.note)}</div>`:""}
      <div class="bar"><i class="${pct===100?"full":""}" style="width:${pct}%"></i></div>
      <ul class="ck">${m.items.map((it,j)=>`<li class="${it.done?"done":""}" data-ms="${esc(m.id)}" data-i="${j}">
        <span class="box">${it.done?"✓":""}</span><span>${esc(it.label)}${it.sub?`<span class="sub">${esc(it.sub)}</span>`:""}</span></li>`).join("")}</ul>
    </div>`;
  }).join("");
  // 결정·논의
  const decs = state.decisions||[];
  const openN = decs.filter(d=>d.status==="open"||d.status==="hold").length;
  html += `<div class="section-h">⚖️ 결정·논의 대기 ${openN?`<span class="pill open">${openN} 대기</span>`:""}
    <button class="btn ghost" id="btnAddDec" style="margin-left:auto">＋ 항목</button></div>
    <div class="section-sub">정해줘야 진행되는 지점 · 정본 채널 = open_questions.md ↔ confirmed_decisions.md</div>
    <div class="dlist">${decs.map(decHtml).join("") || `<div class="col-empty">열린 결정 항목 없음</div>`}</div>`;
  // 문서
  html += `<div class="section-h">📁 문서 바로가기</div><div class="docs">${(state.docs||[]).map(d=>
    `<a href="${esc(d.href)}" target="_blank" rel="noopener"><span class="dl">${esc(d.label)}</span><span class="dn">${esc(d.note||"")}</span></a>`).join("")}</div>`;
  html += `</div>`;
  $("#view-progress").innerHTML = html;
  $$("#view-progress .ck li").forEach(li=> li.onclick = ()=> toggleMs(li.dataset.ms, +li.dataset.i));
  $("#btnAddDec").onclick = ()=> openDec(null);
  $$("#view-progress [data-editdec]").forEach(b=> b.onclick = ()=> openDec(b.dataset.editdec));
}
function decHtml(d){

    <div class="dq">${esc(d.q)}</div>
    <div class="dmeta"><span class="pill ${esc(d.status)}">${DEC_LABEL[d.status]||d.status}</span>
      ${a?`올림 <b style="color:${esc(a.color)}">${esc(a.name)}</b>`:""} →

// ── GitHub 라이브 ─────────────────────────────────────────────────────────────
function loadCfg(){
  let c={}; try{ c=JSON.parse(localStorage.getItem(LS_CFG)||"{}"); }catch(e){}
  const m=Object.assign({ token:"", owner:"luapapa0613", repo:"project_2", path:"planning/board/board-data.js",
    branch:"board-data", poll:true, pollSec:20, autosave:true, autosaveSec:2.5, me:"" }, c);
  if(m.branch==="main") m.branch="board-data";
  return m;
}
function persistCfg(){ localStorage.setItem(LS_CFG, JSON.stringify(cfg)); }
function apiHeaders(){ return { "Authorization":"Bearer "+cfg.token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" }; }
function contentsUrl(){ return `${GH_API}/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURI(cfg.path)}`; }
function getUrl(){ return contentsUrl()+"?ref="+encodeURIComponent(cfg.branch||"board-data")+"&_="+(remoteSha||"x"); }
function b64encode(str){ const b=new TextEncoder().encode(str); let s=""; for(const x of b) s+=String.fromCharCode(x); return btoa(s); }
function b64decode(b64){ const bin=atob(b64.replace(/\s/g,"")); return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0))); }
function parseBoardText(txt){
  const body = txt.replace(/^\s*\/\/.*$/gm,"");   // 주석 줄 제거 후 JSON 추출(주석 속 중괄호 회피)
  const a=body.indexOf("{"), b=body.lastIndexOf("}");
  if(a<0||b<0||b<a) throw new Error("board-data.js 형식 파싱 실패");
  return JSON.parse(body.slice(a,b+1));
}
function updateConnChip(){
  const chip=$("#connChip");
  if(apiMode){ chip.className="conn live"; chip.textContent=`🟢 라이브${cfg.autosave?"·자동":""} · ${cfg.owner}/${cfg.repo}@${cfg.branch}`;
    $("#btnSave").textContent="💾 저장"; $("#btnConnect").style.display="none"; }
  else { chip.className="conn local"; chip.textContent="⚪ 로컬"; $("#btnSave").textContent=(window.showSaveFilePicker||fileHandle)?"💾 저장":"💾 내려받기";
    if(window.showOpenFilePicker) $("#btnConnect").style.display=""; }
}
function connErr(msg){ const c=$("#connChip"); c.className="conn err"; c.textContent="🔴 "+msg.slice(0,34); toast("⚠ "+msg); }
async function loadFromApi(silent){
  if(!apiMode) return;
  try{
    const r=await fetch(getUrl(),{headers:apiHeaders(),cache:"no-store"});
    if(r.status===404){ connErr("데이터 없음: "+cfg.path); if(!state) showSetup("경로 확인: "+cfg.path); return; }
    if(r.status===401||r.status===403){ connErr("토큰 인증 실패("+r.status+")"); if(!state) showSetup("토큰/권한 오류 ("+r.status+")"); return; }
    if(!r.ok){ connErr("로드 실패 HTTP "+r.status); return; }
    const j=await r.json(); remoteSha=j.sha;
    state=normalize(parseBoardText(b64decode(j.content)));
    clearDirty(); updateConnChip(); renderAll();
    if(!silent) toast("🔄 GitHub에서 최신 반영"); startPoll();
  }catch(e){ connErr("로드 오류: "+e.message); if(!state) showSetup("로드 오류: "+e.message); }
}
async function saveToApi(){
  if(!apiMode||saving) return; saving=true;
  if(autosaveTimer){ clearTimeout(autosaveTimer); autosaveTimer=null; }
  try{
    if(remoteSha===null){ const r=await fetch(getUrl(),{headers:apiHeaders(),cache:"no-store"}); if(r.ok) remoteSha=(await r.json()).sha; }
    const body={ message:`board: web 편집 (${todayStr()})`, content:b64encode(serialize()), sha:remoteSha, branch:cfg.branch||"board-data" };
    const r=await fetch(contentsUrl(),{ method:"PUT", headers:apiHeaders(), body:JSON.stringify(body) });
    if(r.status===409||r.status===422){ toast("⚠ 상대가 먼저 저장 — 🔄(다시 읽기) 후 재시도"); const c=$("#connChip"); c.className="conn err"; c.textContent="🔴 원격 변경됨 · 🔄 필요"; return; }
    if(!r.ok){ console.error(await r.text()); connErr("저장 실패 HTTP "+r.status); return; }
    remoteSha=(await r.json()).content.sha; clearDirty(); updateConnChip(); toast("💾 저장 완료 — 상대에게 자동 반영");
  }catch(e){ connErr("저장 오류: "+e.message); }
  finally{ saving=false; }
}
function startPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } if(!apiMode||!cfg.poll) return; pollTimer=setInterval(pollCheck, Math.max(10,cfg.pollSec||20)*1000); }
async function pollCheck(){
  if(!apiMode) return;
  try{
    const r=await fetch(getUrl(),{headers:apiHeaders(),cache:"no-store"}); if(!r.ok) return;
    const j=await r.json(); if(j.sha===remoteSha) return;
    if(dirty){ const c=$("#connChip"); c.className="conn err"; c.textContent="🔴 상대 변경됨 · 저장 전 동기화"; toast("⚠ 상대가 변경했습니다 — 저장 전 🔄로 맞추세요"); return; }
    remoteSha=j.sha; state=normalize(parseBoardText(b64decode(j.content))); clearDirty(); updateConnChip(); renderAll(); toast("🔄 상대 변경 자동 반영됨");
  }catch(e){}
}

// ── 저장(dirty/자동) ──────────────────────────────────────────────────────────
function serialize(){ state.meta.updated=todayStr(); return FILE_HEADER+JSON.stringify(state,null,2)+";\n"; }
function markDirty(){
  dirty=true; $("#dirty").classList.add("on"); $("#savedTag").classList.remove("on");
  if(apiMode&&cfg.autosave){ $("#dirtyTxt").textContent="저장 대기…"; scheduleAutoSave(); }
  else $("#dirtyTxt").textContent = apiMode?"저장 안 됨 — 💾":"저장 안 됨 — 💾 후 push";
}
function clearDirty(){ dirty=false; $("#dirty").classList.remove("on"); $("#savedTag").classList.add("on"); setTimeout(()=>$("#savedTag").classList.remove("on"),2400); }
function scheduleAutoSave(){ if(autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer=setTimeout(async()=>{ autosaveTimer=null; if(apiMode&&cfg.autosave&&dirty&&!saving){ $("#dirtyTxt").textContent="저장 중…"; await saveToApi(); } }, Math.max(1,cfg.autosaveSec||2.5)*1000); }
async function saveFile(){

      const w=await fileHandle.createWritable(); await w.write(serialize()); await w.close(); clearDirty(); toast("💾 저장 — git push 하세요"); return;
    }catch(e){ if(e.name!=="AbortError") toast("저장 실패: "+e.message); return; }

  downloadFile();
}
async function connectFile(){

    fileHandle=h; const txt=await(await h.getFile()).text(); state=normalize(parseBoardText(txt)); clearDirty(); renderAll(); toast("✔ 파일 연결됨");
  }catch(e){ if(e.name!=="AbortError") toast("연결 실패"); }
}
function downloadFile(){ const b=new Blob([serialize()],{type:"text/javascript"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=FILE_NAME; a.click(); URL.revokeObjectURL(a.href); clearDirty(); toast("⬇ 내려받음 — 덮어쓰고 git push"); }

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function nowISO(){ return new Date().toISOString(); }
function relTime(ts){
  if(!ts) return ""; const d=new Date(ts), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60) return "방금"; if(s<3600) return Math.floor(s/60)+"분 전"; if(s<86400) return Math.floor(s/3600)+"시간 전";
  if(s<604800) return Math.floor(s/86400)+"일 전"; return `${d.getMonth()+1}/${d.getDate()}`;
}
let toastT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),2300); }

// ── 배선 ──────────────────────────────────────────────────────────────────────
function bindUI(){
  $("#btnSave").onclick=saveFile; $("#btnSettings").onclick=openCfg; $("#btnConnect").onclick=connectFile; $("#btnDownload").onclick=downloadFile;
  $("#btnAddCard").onclick=()=>openDetail(null,"planning");
  $("#meSel").onchange=e=>{ cfg.me=e.target.value; persistCfg(); $("#mePick").classList.toggle("unset",!cfg.me); $("#d-cmWho").textContent=cfg.me?`작성자: ${member(cfg.me)?.name}`:"⚠ 상단에서 '나'를 먼저 선택하세요"; };
  $$(".tab").forEach(b=> b.onclick=()=>setTab(b.dataset.tab));
  // 활동 드롭다운
  $("#btnBell").onclick=e=>{ e.stopPropagation(); $("#actDrop").classList.toggle("on"); };
  $("#actAll").onclick=()=>{ $("#actDrop").classList.remove("on"); setTab("history"); };
  document.addEventListener("click", e=>{ if(!e.target.closest("#actDrop")&&!e.target.closest("#btnBell")) $("#actDrop").classList.remove("on"); });
  // 상세
  $("#d-save").onclick=saveDetail; $("#d-cancel").onclick=closeDetail; $("#d-close").onclick=closeDetail; $("#d-delete").onclick=deleteDetail;
  $("#sheetBg").onclick=closeDetail;
  $("#d-clAdd").onclick=addCheck; $("#d-clNew").onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault();addCheck();} };
  $("#d-cmAdd").onclick=addComment; $("#d-cmNew").onkeydown=e=>{ if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();addComment();} };
  // 결정/설정
  $("#k-ok").onclick=saveDec; $("#k-cancel").onclick=closeModals; $("#k-delete").onclick=deleteDec;
  $("#g-save").onclick=saveCfgModal; $("#g-cancel").onclick=closeModals; $("#g-clear").onclick=clearCfg;
  $$(".mbg").forEach(bg=> bg.onclick=e=>{ if(e.target===bg) closeModals(); });
  // 필터
  $$("#ownerFilter button").forEach(b=> b.onclick=()=>{ $$("#ownerFilter button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); filterOwner=b.dataset.o; renderBoard(); });
  $("#search").oninput=e=>{ searchText=e.target.value.trim().toLowerCase(); renderBoard(); };
  document.addEventListener("keydown", e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="s"){ e.preventDefault(); saveFile(); }
    if(e.key==="Escape"){ closeModals(); closeDetail(); $("#actDrop").classList.remove("on"); }
  });
  window.addEventListener("beforeunload", e=>{ if(dirty){ e.preventDefault(); e.returnValue=""; } });
}
boot();
</script>
